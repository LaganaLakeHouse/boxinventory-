<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><title>Lake House Inventory</title><style>:root{--accent:#E07020;--bg:#FDF6EE;--card:#fff;--text:#1A1410;--t2:#6B5F55;--t3:#A09080;--border:rgba(0,0,0,0.09);--sh:0 2px 8px rgba(0,0,0,0.07)}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app{max-width:640px;margin:0 auto;padding-bottom:40px}.hdr{position:sticky;top:0;background:var(--bg);padding:14px 16px 12px;border-bottom:1px solid var(--border);backdrop-filter:blur(10px);z-index:50}.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.brand{display:flex;align-items:center;gap:10px}.title{font-size:19px;font-weight:600}.sub{font-size:11px;color:var(--t2);margin-top:1px}.acts{display:flex;gap:6px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:inherit;font-weight:500;border-radius:9px;transition:transform .1s}.btn:active{transform:scale(.95)}.btn-p{background:var(--accent);color:#fff;padding:9px 16px;font-size:14px}.btn-s{background:var(--card);color:var(--text);border:1px solid rgba(0,0,0,.13);padding:8px 12px;font-size:13px}.btn-ic{background:var(--card);border:1px solid var(--border);width:36px;height:36px;font-size:16px;color:var(--t2)}.sr{display:flex;flex-direction:column;gap:6px}.si{position:relative}.si span{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none}.si input{width:100%;padding:9px 12px 9px 32px;border:1px solid rgba(0,0,0,.13);border-radius:9px;background:var(--card);color:var(--text);font-family:inherit;font-size:14px;-webkit-appearance:none}.si input:focus{outline:none;border-color:var(--accent)}.si input::placeholder{color:var(--t3)}.content{padding:12px 16px}.stats{display:flex;gap:8px;margin-bottom:10px}.stat{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 12px;flex:1}.stat-n{font-size:19px;font-weight:600;color:var(--accent)}.stat-l{font-size:11px;color:var(--t2)}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:8px}.card-top{display:flex;gap:10px;align-items:flex-start}.card-info{flex:1;min-width:0}.card-name{font-size:15px;font-weight:600;margin-bottom:2px}.card-meta{font-size:11px;color:var(--t2);margin-bottom:1px}.card-acts{display:flex;gap:4px}.btn-pr{background:#e8f4fd;color:#1a6fa8;border:none;width:32px;height:32px;font-size:14px;border-radius:7px}.btn-ed{background:#FEF3C7;color:#D97706;border:none;width:32px;height:32px;font-size:14px;border-radius:7px}.btn-dl{background:#FEE2E2;color:#B91C1C;border:none;width:32px;height:32px;font-size:14px;border-radius:7px}.tog{width:100%;text-align:left;background:none;border:none;border-top:1px solid var(--border);padding:7px 0 0;margin-top:8px;font-family:inherit;font-size:12px;color:var(--t3);cursor:pointer;display:flex;align-items:center;gap:4px}.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}.chip{background:#FAEEE0;color:var(--t2);border-radius:20px;padding:3px 9px;font-size:12px;border:1px solid var(--border)}.chip.hl{background:#FEE8D0;color:#8B3A00;border-color:var(--accent)}.ifilter{position:relative;margin:8px 0 4px}.ifilter span{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t3);pointer-events:none}.ifilter input{width:100%;padding:7px 10px 7px 26px;border:1px solid rgba(0,0,0,.13);border-radius:8px;font-size:13px;background:#FFF8F2;color:var(--text);font-family:inherit;-webkit-appearance:none}.ifilter input:focus{outline:none;border-color:var(--accent)}.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;animation:si .2s ease}@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}.ptitle{font-size:16px;font-weight:600;margin-bottom:14px}.field{margin-bottom:12px}.field label{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.field input,.field select{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.13);border-radius:9px;background:#FFF8F2;color:var(--text);font-family:inherit;font-size:14px;-webkit-appearance:none}.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}.field input::placeholder{color:var(--t3)}.add-row{display:flex;gap:6px;margin-bottom:8px}.add-row input{flex:1}.achips{display:flex;flex-wrap:wrap;gap:4px;min-height:28px;margin-bottom:12px}.achip{background:#FAEEE0;color:var(--t2);border-radius:20px;padding:4px 8px 4px 11px;font-size:13px;display:flex;align-items:center;gap:5px;border:1px solid rgba(0,0,0,.13)}.achip button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;line-height:1;padding:0}.ff{display:flex;gap:8px;margin-top:4px}.ff .btn-p{flex:1;padding:11px}.pzone{border:2px dashed rgba(0,0,0,.13);border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:#FFF8F2;margin-bottom:8px;display:block}.pzone input{display:none}.pz-icon{font-size:28px;margin-bottom:4px}.pz-text{font-size:13px;color:var(--t2)}.pz-sub{font-size:11px;color:var(--t3);margin-top:2px}.aibox{background:#FEE8D0;border:1px solid var(--accent);border-radius:9px;padding:10px 12px;margin-bottom:8px}.ailbl{font-size:10px;font-weight:700;color:#8B3A00;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.aichips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}.aichip{background:var(--card);color:var(--text);border-radius:20px;padding:3px 9px;font-size:12px;border:1px solid rgba(0,0,0,.13)}.spin{display:inline-block;width:16px;height:16px;border:2px solid #FEE8D0;border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}@keyframes sp{to{transform:rotate(360deg)}}.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;padding:16px}.modal{background:var(--card);border-radius:14px;padding:20px;width:100%;max-width:420px}.mtitle{font-size:17px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}.mx{background:#FAEEE0;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--t2);font-family:inherit}.qrwrap{background:#fff;border-radius:9px;padding:16px;text-align:center;margin-bottom:12px;border:1px solid var(--border)}.qrwrap img{display:block;margin:0 auto;border-radius:4px}.qlbl{font-size:14px;font-weight:600;color:#1A1410;margin-top:8px}.qsub{font-size:11px;color:#6B5F55;margin-top:2px}.popts{display:flex;flex-direction:column;gap:6px}.popt{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid rgba(0,0,0,.13);border-radius:9px;cursor:pointer;background:#FFF8F2;font-family:inherit;font-size:13px;font-weight:500;color:var(--text)}.popt:hover{background:#FEE8D0;border-color:var(--accent)}.popt-icon{font-size:22px;flex-shrink:0}.popt-sz{font-size:11px;color:var(--t2);font-weight:400;margin-top:1px}.ptip{font-size:11px;color:var(--t3);text-align:center;margin-top:8px;line-height:1.5}.empty{text-align:center;padding:50px 20px}.empty-icon{font-size:52px;margin-bottom:12px}.empty-title{font-size:18px;font-weight:600;margin-bottom:6px}.empty-sub{font-size:13px;color:var(--t2);line-height:1.5;max-width:260px;margin:0 auto 20px}.tip{background:#FAEEE0;border-radius:9px;padding:10px 12px;margin:0 16px 16px;font-size:11px;color:var(--t2);line-height:1.6;border:1px solid var(--border)}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 18px;border-radius:50px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;pointer-events:none}.shdr{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}</style></head><body>
<div class="app">
<div class="hdr">
<div class="hdr-top">
<div class="brand">
<svg width="34" height="34" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="18" fill="#1a5fa8"/><rect x="0" y="62" width="100" height="38" fill="#2980c4"/><rect x="0" y="75" width="100" height="25" fill="#1a6fa8"/><polygon points="50,8 78,35 68,35 68,62 32,62 32,35 22,35" fill="#e8f4fd"/><rect x="42" y="44" width="16" height="18" fill="#1a5fa8"/><rect x="34" y="35" width="10" height="12" fill="#b8d9f5"/><rect x="56" y="35" width="10" height="12" fill="#b8d9f5"/><rect x="15" y="58" width="4" height="16" fill="#6b4423"/><rect x="10" y="56" width="14" height="3" fill="#6b4423"/><rect x="81" y="58" width="4" height="16" fill="#6b4423"/><rect x="76" y="56" width="14" height="3" fill="#6b4423"/><ellipse cx="20" cy="52" rx="8" ry="10" fill="#2d7a3a"/><ellipse cx="80" cy="52" rx="8" ry="10" fill="#2d7a3a"/><ellipse cx="14" cy="48" rx="6" ry="8" fill="#38a048"/><ellipse cx="86" cy="48" rx="6" ry="8" fill="#38a048"/><path d="M5,78 Q25,70 50,74 Q75,70 95,78" stroke="white" stroke-width="2.5" fill="none" opacity="0.6"/><path d="M5,85 Q25,77 50,81 Q75,77 95,85" stroke="white" stroke-width="2" fill="none" opacity="0.4"/></svg>
<div><div class="title">Lake House Inventory</div><div class="sub" id="sub">0 boxes</div></div>
</div>
<div class="acts">
<button class="btn btn-ic" id="btn-exp" title="Export">&#8675;</button>
<label class="btn btn-ic" style="cursor:pointer" title="Import">&#8673;<input type="file" accept=".json" id="imp" style="display:none"></label>
<button class="btn btn-p" id="btn-new">+ New Box</button>
</div>
</div>
<div class="sr">
<div class="si"><span>&#127757;</span><input id="sg" type="search" placeholder="Global search - all boxes and items..."></div>
<div class="si"><span>&#127968;</span><input id="sb" type="search" placeholder="Find a specific box by name..."></div>
</div>
</div>
<div id="form-area" style="display:none;padding:12px 16px 0">
<div class="panel">
<div class="ptitle" id="fttl">New Box</div>
<div class="field"><label>Box Name *</label><input id="fn" type="text" placeholder="e.g. Holiday Decorations"></div>
<div class="field"><label>Category</label><select id="fcat"><option value="">Select...</option><option>Attic</option><option>Basement</option><option>Garage</option><option>Kitchen</option><option>Living Room</option><option>Bedroom</option><option>Bathroom</option><option>Office</option><option>Lake House</option><option>Dock</option><option>Shed</option><option>Other</option></select></div>
<div class="field"><label>Location</label><input id="fl" type="text" placeholder="e.g. Shelf 2, North Wall"></div>
<div class="field"><label>Last Opened</label><input id="fdate" type="date"></div>
<div class="field"><label>Notes</label><input id="fd" type="text" placeholder="e.g. Fragile, Heavy"></div>

</div>

</div>

</div>
</div>
<div class="content">
<div id="sw" style="display:none">
<div class="stats"><div class="stat"><div class="stat-n" id="s-b">0</div><div class="stat-l">Boxes</div></div><div class="stat"><div class="stat-n" id="s-i">0</div><div class="stat-l">Items</div></div><div class="stat"><div class="stat-n" id="s-l">0</div><div class="stat-l">Locations</div></div></div>
<div id="cbar" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none"></div>
<div style="margin-bottom:10px"><button class="btn btn-s" id="btn-rpt" style="background:#d4edda;color:#2d7a3a;border-color:#2d7a3a">&#128203; Print Full Report</button></div>
</div>
<div id="list"></div>
</div>
<div class="overlay" id="pm" style="display:none"><div class="modal"><div class="mtitle">Print Label<button class="mx" id="mx">x</button></div><div class="qrwrap"><img id="mqr" src="" width="180" height="180" alt="QR"><div class="qlbl" id="mlbl"></div><div class="qsub" id="msub"></div></div><div class="popts"><button class="popt" id="p-sm"><span class="popt-icon">&#127991;</span><div><div>Small Label</div><div class="popt-sz">2" x 1" - Standard Nelko roll</div></div></button><button class="popt" id="p-fl"><span class="popt-icon">&#128196;</span><div><div>Full Label</div><div class="popt-sz">4" x 6" - Large roll</div></div></button><button class="popt" id="p-lt"><span class="popt-icon">&#128451;</span><div><div>Letter Sheet</div><div class="popt-sz">8.5" x 11" - Regular paper</div></div></button></div><p class="ptip">Connect Nelko PL70e-BT via Bluetooth first.</p></div></div>
<div class="empty" id="empty" style="display:none"><div class="empty-icon">&#127968;</div><div class="empty-title">No boxes yet!</div><div class="empty-sub">Tap <strong>+ New Box</strong> to get started!</div><button class="btn btn-p" onclick="openForm()">+ Add First Box</button></div>
<div class="tip" id="tip" style="display:none">Scan QR labels with your iPhone camera. Export regularly to back up data.</div>
</div>
<script>
var DB='lhi_v3',C=[],eId=null,cI=[],pT=null,aC='All';
function load(){try{C=JSON.parse(localStorage.getItem(DB)||'[]')}catch(e){C=[]}}
function save(){localStorage.setItem(DB,JSON.stringify(C))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function qrUrl(c,sz){sz=sz||150;var d='LAKE HOUSE INVENTORY\nBox: '+c.name+'\n';if(c.category)d+='Category: '+c.category+'\n';if(c.location)d+='Location: '+c.location+'\n';if(c.lastOpened)d+='Last Opened: '+c.lastOpened+'\n';if(c.desc)d+='Notes: '+c.desc+'\n';if(c.items&&c.items.length)d+='Contents: '+c.items.join(', ')+'\n';d+='ID: '+c.id;return 'https://api.qrserver.com/v1/create-qr-code/?size='+sz+'x'+sz+'&data='+encodeURIComponent(d)+'&qzone=1&ecc=M'}
function render(){
var gq=document.getElementById('sg').value.trim().toLowerCase();
var bq=document.getElementById('sb').value.trim().toLowerCase();
document.getElementById('sub').textContent=C.length+' box'+(C.length!==1?'es':'')+' - Nelko PL70e-BT';
var sw=document.getElementById('sw'),ti=document.getElementById('tip');
if(C.length>0){sw.style.display='block';ti.style.display='block';document.getElementById('s-b').textContent=C.length;document.getElementById('s-i').textContent=C.reduce(function(s,c){return s+c.items.length},0);document.getElementById('s-l').textContent=new Set(C.filter(function(c){return c.location}).map(function(c){return c.location})).size;renderCats()}
else{sw.style.display='none';ti.style.display='none'}
var f=C;
if(gq)f=f.filter(function(c){return c.name.toLowerCase().includes(gq)||(c.location||'').toLowerCase().includes(gq)||(c.category||'').toLowerCase().includes(gq)||(c.desc||'').toLowerCase().includes(gq)||c.items.some(function(i){return i.toLowerCase().includes(gq)})});
if(bq)f=f.filter(function(c){return c.name.toLowerCase().includes(bq)});
if(aC!=='All')f=f.filter(function(c){return(c.category||'Other')===aC});
var list=document.getElementById('list'),empty=document.getElementById('empty');
if(!f.length){list.innerHTML=C.length?'<p style="text-align:center;color:var(--t3);padding:2rem;font-size:13px">No results</p>':'';empty.style.display=C.length?'none':'block';return}
empty.style.display='none';
var h='<div class="shdr">'+f.length+' container'+(f.length!==1?'s':'')+'</div>';
f.forEach(function(c){
h+='<div class="card"><div class="card-top"><img src="'+qrUrl(c,52)+'" width="52" height="52" style="border-radius:6px;flex-shrink:0;border:1px solid var(--border)" alt="QR"><div class="card-info">'+(c.category?'<div style="display:inline-block;background:#FEE8D0;color:#8B3A00;border-radius:20px;padding:1px 8px;font-size:10px;font-weight:700;margin-bottom:2px">'+esc(c.category)+'</div>':'')+
'<div class="card-name">'+esc(c.name)+'</div>'+(c.location?'<div class="card-meta">&#128205; '+esc(c.location)+'</div>':'')+(c.lastOpened?'<div class="card-meta">&#128197; '+esc(c.lastOpened)+'</div>':'')+(c.desc?'<div class="card-meta">&#128203; '+esc(c.desc)+'</div>':'')+
'<div class="card-meta" style="color:var(--t3)">'+c.items.length+' item'+(c.items.length!==1?'s':'')+'</div></div>'+
'<div class="card-acts"><button class="btn btn-pr" onclick="openPrint(\''+c.id+'\')" title="Print">&#128424;</button><button class="btn btn-ed" onclick="openEdit(\''+c.id+'\')" title="Edit">&#9999;</button><button class="btn btn-dl" onclick="delBox(\''+c.id+'\')" title="Delete">&#128465;</button></div></div>'+
(c.items.length?'<button class="tog" onclick="tog(\''+c.id+'\')"><span id="ti-'+c.id+'">&#9658;</span>&nbsp;<span id="tl-'+c.id+'">Show '+c.items.length+' items</span></button><div id="ic-'+c.id+'" style="display:none"><div class="ifilter"><span>&#128269;</span><input type="search" placeholder="Filter items..." oninput="fch(this,\'ch-'+c.id+'\')" style="outline:none"></div><div class="chips" id="ch-'+c.id+'">'+c.items.map(function(i){var hi=gq&&i.toLowerCase().includes(gq);return'<span class="chip'+(hi?' hl':'')+'" data-v="'+esc(i)+'">'+esc(i)+'</span>'}).join('')+'</div></div>':'')+'</div>';
});
list.innerHTML=h;
}
function renderCats(){var cats=['All'];C.forEach(function(c){if(c.category&&!cats.includes(c.category))cats.push(c.category)});document.getElementById('cbar').innerHTML=cats.map(function(cat){return'<button style="background:'+(aC===cat?'var(--accent)':'var(--card)')+';color:'+(aC===cat?'#fff':'var(--t2)')+';border:1px solid '+(aC===cat?'var(--accent)':'rgba(0,0,0,.13)')+';border-radius:50px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit" onclick="setC(\''+esc(cat)+'\')">'+esc(cat)+'</button>'}).join('')}
function setC(c){aC=c;render()}
function fch(inp,id){var q=inp.value.trim().toLowerCase();var w=document.getElementById(id);if(!w)return;w.querySelectorAll('.chip').forEach(function(ch){var v=(ch.dataset.v||ch.textContent).toLowerCase();var m=!q||v.includes(q);ch.style.display=m?'':'none';ch.classList.toggle('hl',!!(q&&m))})}
function tog(id){var el=document.getElementById('ic-'+id),ic=document.getElementById('ti-'+id),lb=document.getElementById('tl-'+id);var c=C.find(function(x){return x.id===id});var n=c?c.items.length:0;if(el.style.display==='none'){el.style.display='block';ic.innerHTML='&#9660;';lb.textContent='Hide '+n+' items'}else{el.style.display='none';ic.innerHTML='&#9658;';lb.textContent='Show '+n+' items'}}
function openForm(id){eId=id||null;var c=id?C.find(function(x){return x.id===id}):null;document.getElementById('fn').value=c?c.name:'';document.getElementById('fcat').value=c?(c.category||''):'';document.getElementById('fl').value=c?(c.location||''):'';document.getElementById('fdate').value=c?(c.lastOpened||''):'';document.getElementById('fd').value=c?(c.desc||''):'';cI=c?c.items.slice():[];document.getElementById('fi').value='';document.getElementById('fttl').textContent=id?'Edit Box':'New Box';document.getElementById('ai-res').style.display='none';resetPhoto();renderA();document.getElementById('form-area').style.display='block';window.scrollTo({top:0,behavior:'smooth'})}
function openEdit(id){openForm(id)}
function closeForm(){document.getElementById('form-area').style.display='none';eId=null;cI=[]}
function renderA(){var w=document.getElementById('achips');if(!cI.length){w.innerHTML='<span style="font-size:13px;color:var(--t3)">No items yet</span>';return}w.innerHTML=cI.map(function(it,i){return'<span class="achip">'+esc(it)+'<button onclick="rmI('+i+')">x</button></span>'}).join('')}
function rmI(i){cI.splice(i,1);renderA()}
function addItem(){var inp=document.getElementById('fi'),v=inp.value.trim();if(v&&!cI.includes(v)){cI.push(v);renderA()}inp.value='';inp.focus()}
function saveBox(){var name=document.getElementById('fn').value.trim();if(!name){document.getElementById('fn').focus();toast('Please enter a box name');return}var obj={name:name,category:document.getElementById('fcat').value,location:document.getElementById('fl').value.trim(),lastOpened:document.getElementById('fdate').value,desc:document.getElementById('fd').value.trim(),items:cI};if(eId){var idx=C.findIndex(function(c){return c.id===eId});if(idx>-1)C[idx]=Object.assign({},C[idx],obj)}else C.push(Object.assign({id:gid(),createdAt:Date.now()},obj));save();closeForm();render();toast(eId?'Box updated!':'Box created!')}

function doPrint(sz){var c=pT;var qSrc=qrUrl(c,sz==='small'?200:300);var win=window.open('','_blank','width=700,height=800');var ei=function(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')};var html='';if(sz==='small'){html='<!DOCTYPE html><html><head><title>'+ei(c.name)+'</title><style>@page{size:2in 1in;margin:0}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;width:2in;height:1in;display:flex;align-items:center;padding:3px;gap:3px;overflow:hidden}.qr{width:.9in;height:.9in;flex-shrink:0}.qr img{width:100%;height:100%}.info{flex:1;overflow:hidden}.name{font-size:7.5pt;font-weight:bold;line-height:1.2;margin-bottom:1px}.cat{font-size:5.5pt;color:#888;margin-bottom:1px}.loc{font-size:5.5pt;color:#555;margin-bottom:2px}.items{font-size:5pt;color:#333;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}.id{font-size:4pt;color:#bbb;margin-top:2px}</style></head><body><div class="qr"><img src="'+qSrc+'"></div><div class="info"><div class="name">'+ei(c.name)+'</div>'+(c.category?'<div class="cat">'+ei(c.category)+'</div>':'')+(c.location?'<div class="loc">'+ei(c.location)+'</div>':'')+'<div class="items">'+c.items.map(ei).join(', ')+'</div><div class="id">'+c.id+'</div></div></body></html>'}else if(sz==='full'){html='<!DOCTYPE html><html><head><title>'+ei(c.name)+'</title><style>@page{size:4in 6in;margin:.25in}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif}.ct{text-align:center}h1{font-size:15pt;margin-bottom:2px}.cat{display:inline-block;background:#FEE8D0;color:#8B3A00;border-radius:20px;padding:2px 10px;font-size:8pt;font-weight:bold;margin-bottom:6px}.loc{font-size:9pt;color:#555;margin-bottom:2px}.dt{font-size:8pt;color:#888;margin-bottom:8px}.qr{display:block;margin:8px auto}.ln{border:none;border-top:1px solid #ddd;margin:10px 0 6px}.sec{font-size:7pt;font-weight:bold;text-transform:uppercase;color:#888;margin-bottom:5px}ul{padding-left:14px;line-height:1.7;font-size:8.5pt}.id{font-size:5pt;color:#ccc;text-align:center;margin-top:8px}</style></head><body><div class="ct"><h1>'+ei(c.name)+'</h1>'+(c.category?'<div><span class="cat">'+ei(c.category)+'</span></div>':'')+(c.location?'<div class="loc">'+ei(c.location)+'</div>':'')+(c.lastOpened?'<div class="dt">Last opened: '+ei(c.lastOpened)+'</div>':'')+'<img class="qr" src="'+qSrc+'" width="180" height="180"></div><hr class="ln"><div class="sec">Contents ('+c.items.length+')</div><ul>'+c.items.map(function(i){return'<li>'+ei(i)+'</li>'}).join('')+'</ul><div class="id">'+c.id+'</div></body></html>'}else{html='<!DOCTYPE html><html><head><title>'+ei(c.name)+'</title><style>@page{size:letter;margin:.75in}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif}.hdr{display:flex;align-items:center;gap:20px;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #E07020}h1{font-size:20pt;margin-bottom:3px}.cat{display:inline-block;background:#FEE8D0;color:#8B3A00;border-radius:20px;padding:2px 10px;font-size:9pt;font-weight:bold;margin-bottom:4px}.meta{font-size:10pt;color:#555;margin-bottom:2px}.sec{font-size:8pt;font-weight:bold;text-transform:uppercase;color:#888;margin:14px 0 6px}ul{columns:2;column-gap:24px;padding-left:16px;line-height:1.8;font-size:11pt}.id{font-size:6pt;color:#ccc;margin-top:16px;text-align:right}</style></head><body><div class="hdr"><img src="'+qSrc+'" width="100" height="100" style="flex-shrink:0"><div><h1>'+ei(c.name)+'</h1>'+(c.category?'<div><span class="cat">'+ei(c.category)+'</span></div>':'')+(c.location?'<div class="meta">'+ei(c.location)+'</div>':'')+(c.lastOpened?'<div class="meta">Last opened: '+ei(c.lastOpened)+'</div>':'')+(c.desc?'<div class="meta">'+ei(c.desc)+'</div>':'')+'</div></div><div class="sec">Contents ('+c.items.length+')</div><ul>'+c.items.map(function(i){return'<li>'+ei(i)+'</li>'}).join('')+'</ul><div class="id">'+c.id+' - Printed '+new Date().toLocaleDateString()+'</div></body></html>'}

function printRpt(){var win=window.open('','_blank','width=900,height=800');var ei=function(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')};var cats={};C.forEach(function(c){var cat=c.category||'Uncategorized';if(!cats[cat])cats[cat]=[];cats[cat].push(c)});var html='<!DOCTYPE html><html><head><title>Lake House Inventory Report</title><style>@page{size:letter;margin:.75in}body{font-family:Arial,sans-serif;font-size:10pt}.hdr{background:#1a5fa8;color:white;padding:16px 20px;margin-bottom:20px}.hdr h1{font-size:18pt;margin-bottom:2px}.hdr p{font-size:9pt;opacity:.8}.cs{margin-bottom:20px}.ct{font-size:12pt;font-weight:bold;color:#E07020;border-bottom:2px solid #E07020;padding-bottom:4px;margin-bottom:10px}.br{display:flex;gap:12px;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:6px}.br img{width:60px;height:60px;flex-shrink:0}.bi{flex:1}.bn{font-weight:bold;font-size:11pt}.bm{font-size:8pt;color:#666;margin:2px 0}.bit{font-size:8.5pt;color:#333;margin-top:4px}.ft{font-size:7pt;color:#aaa;text-align:center;margin-top:20px;border-top:1px solid #eee;padding-top:8px}</style></head><body><div class="hdr"><h1>Lake House Inventory Report</h1><p>Generated '+new Date().toLocaleDateString()+' - '+C.length+' boxes, '+C.reduce(function(s,c){return s+c.items.length},0)+' items</p></div>';Object.keys(cats).sort().forEach(function(cat){html+='<div class="cs"><div class="ct">'+ei(cat)+' ('+cats[cat].length+' boxes)</div>';cats[cat].forEach(function(c){html+='<div class="br"><img src="'+qrUrl(c,60)+'"><div class="bi"><div class="bn">'+ei(c.name)+'</div>'+(c.location?'<div class="bm">'+ei(c.location)+'</div>':'')+(c.lastOpened?'<div class="bm">Last opened: '+ei(c.lastOpened)+'</div>':'')+'<div class="bit">'+ei(c.items.join(', '))+'</div></div></div>'});html+='</div>'});html+='<div class="ft">Lake House Inventory - Confidential</div></body></html>';win.document.write(html);win.document.close();setTimeout(function(){win.print()},800)}
